<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - My City Info</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">MYCITYINFO</a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <a href="submit-listing.html" class="btn btn-primary">Add Listing</a>
        <a href="signin.html" class="btn btn-outline">Sign In</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero page-hero">
      <div class="container">
        <h1>Sign In</h1>
      </div>
    </section>

    <section class="page-content">
      <div class="container">
        <div style="max-width: 420px; margin: 0 auto;">
          <form>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
          </form>
          <p style="text-align: center; margin-top: 24px; font-size: var(--font-size-sm); color: var(--secondary);">
            Don't have an account? <a href="submit-listing.html">Add your listing</a> to register.
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer footer-simple">
    <div class="container">
      <ul class="footer-links">
        <li><a href="terms.html">Terms of Use</a></li>
        <li><a href="privacy-policy.html">Privacy Policy</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
      <div class="footer-bottom">
        <p>Copyright &copy; 2024 MyCityInfo. All Rights Reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
